name: Setup Infrastructure

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  apply-dev:
    name: Apply dev infrastructure
    runs-on: ubuntu-latest
    environment: dev
    env:
      TF_VAR_project_id: ${{ vars.TF_VAR_PROJECT_ID }}
      TF_VAR_region: ${{ vars.TF_VAR_REGION }}
      TF_VAR_zone: ${{ vars.TF_VAR_ZONE }}
      TF_VAR_environment: ${{ vars.TF_VAR_ENVIRONMENT }}
    defaults:
      run:
        working-directory: terraform/gcp/envs/dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}
          create_credentials_file: true

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ vars.TF_VAR_PROJECT_ID }}

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: 1.11.6

      - name: OpenTofu fmt check
        run: tofu fmt -check -recursive

      - name: OpenTofu init
        run: |
          tofu init \
            -backend-config="bucket=${{ vars.TF_BACKEND_BUCKET }}" \
            -backend-config="prefix=${{ vars.TF_BACKEND_PREFIX }}"

      - name: OpenTofu validate
        run: tofu validate

      - name: OpenTofu apply
        run: tofu apply -auto-approve

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Install Ansible inventory dependencies
        run: pipx inject ansible-core google-auth requests

      - name: Install Ansible collection
        working-directory: ansible
        run: ansible-galaxy collection install -r collections/requirements.yml

      - name: Create OS Login SSH key
        run: |
          mkdir -p ~/.ssh
          ssh-keygen -t ed25519 -f ~/.ssh/google_compute_engine -N ''
          chmod 600 ~/.ssh/google_compute_engine

      - name: Add OS Login SSH key
        run: gcloud compute os-login ssh-keys add --key-file ~/.ssh/google_compute_engine.pub --ttl=30m

      - name: Wait for OS Login SSH key propagation
        run: sleep 30

      - name: Run Ansible playbook
        working-directory: ansible
        run: ansible-playbook playbooks/postgres.yml

      - name: Remove OS Login SSH key
        if: ${{ always() }}
        run: |
          if [ -f ~/.ssh/google_compute_engine.pub ]; then
            gcloud compute os-login ssh-keys remove --key-file ~/.ssh/google_compute_engine.pub || true
          fi
