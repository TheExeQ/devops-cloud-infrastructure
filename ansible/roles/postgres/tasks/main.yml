---
- name: Validate supported operating system
  ansible.builtin.assert:
    that:
      - ansible_distribution == "Debian"
      - ansible_distribution_major_version == "12"
    fail_msg: This role currently supports the Debian 12 VM provisioned by Terraform.

- name: Install PostgreSQL packages
  ansible.builtin.apt:
    name:
      - postgresql
      - postgresql-contrib
    state: present
    update_cache: true

- name: Configure PostgreSQL listen addresses
  ansible.builtin.lineinfile:
    path: "{{ postgresql_conf_path }}"
    regexp: "^#?listen_addresses\\s*="
    line: "listen_addresses = '{{ postgresql_listen_addresses }}'"
  notify: Restart PostgreSQL

- name: Configure PostgreSQL password encryption
  ansible.builtin.lineinfile:
    path: "{{ postgresql_conf_path }}"
    regexp: "^#?password_encryption\\s*="
    line: "password_encryption = '{{ postgresql_host_auth_method }}'"
  notify: Restart PostgreSQL

- name: Configure client authentication rules
  ansible.builtin.blockinfile:
    path: "{{ postgresql_hba_path }}"
    marker: "# {mark} ANSIBLE MANAGED POSTGRES ACCESS"
    block: |
      {% for cidr in (postgresql_allowed_cidrs if postgresql_allowed_cidrs | length > 0 else ['0.0.0.0/0']) %}
      host    all             all             {{ cidr }}            {{ postgresql_host_auth_method }}
      {% endfor %}
  notify: Restart PostgreSQL

- name: Ensure PostgreSQL service is enabled and running
  ansible.builtin.service:
    name: "{{ postgresql_service_name }}"
    enabled: true
    state: started

- name: Apply pending handler changes
  ansible.builtin.meta: flush_handlers

- name: Set password for postgres role
  ansible.builtin.command:
    cmd: >
      runuser -u postgres -- psql -d postgres -c
      "ALTER USER postgres WITH PASSWORD 'postgres';"

- name: Ensure booksdb database exists
  ansible.builtin.command:
    cmd: runuser -u postgres -- createdb booksdb
  register: create_booksdb_result
  changed_when: create_booksdb_result.rc == 0
  failed_when:
    - create_booksdb_result.rc != 0
    - "'already exists' not in create_booksdb_result.stderr"
